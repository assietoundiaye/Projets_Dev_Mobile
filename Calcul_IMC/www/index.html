<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC Calculator</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <h1>IMC Calculator</h1>
    <form id="imcForm">
        <label for="poids">poids (en kg):</label>
        <input type="number" id="poids" name="poids" required><br><br>
        <label for="taille">taille (en cm):</label>
        <input type="number" id="taille" name="taille" required><br><br>
        <input type="button" value="Calculate IMC" onclick="calculerIMC()" />
    </form>
    <div id="resultat" role="status" aria-live="polite"></div>
    <script src="js/index.js"></script>
</body>
</html>
